syntax = "proto3";

package api.review.v1;

option go_package          = "github.com/open-portfolios/review/api/review/v1;v1";
option java_multiple_files = true;
option java_package        = "api.review.v1";

import "errors/errors.proto";

enum ErrorReason
{
    option (errors.default_code) = 500;

    LOGIN_REQUIRED   = 0 [ (errors.code) = 401 ];
    DATABASE_FAILURE = 1 [ (errors.code) = 500 ];
    ALREADY_REVIEWED = 2 [ (errors.code) = 403 ];
}